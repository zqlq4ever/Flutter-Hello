name: hello_flutter
description: flutter 学习项目

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # JSON 解析
  json_serializable: ^6.11.1
  build_runner: ^2.4.17

  # 日期、条件选择器
  flutter_pickers: ^2.1.8

  # 去除网页 URL 中的 "#" (hash)
  url_strategy: ^0.3.0

  # 国际化
  intl: ^0.20.2

  # Toast 插件
  oktoast: ^3.4.0

  # 网络库
  dio: ^5.8.0+1

  # 响应式编程
  rxdart: ^0.28.0

  # 常用工具类库
  flustars: ^2.0.1

  # 本地存储
  sp_util: ^2.0.3

  # 轮播图
  flutter_swiper_null_safety: ^1.0.2

  # 启动 URL
  url_launcher: ^6.3.1

  # 图片选择器
  image_picker: ^1.1.2

  # 侧滑删除
  flutter_slidable: ^4.0.0

  # WebView
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.10.13

  # 键盘处理
  keyboard_actions: ^4.2.0

  # 列表悬浮头
  sticky_headers: ^0.3.0

  # 城市选择列表
  azlistview: ^2.0.0-nullsafety.0

  # 图片缓存
  cached_network_image: ^3.4.1

  # 字符串格式化
  sprintf: ^7.0.0

  # 扫码
  mobile_scanner: ^6.0.7

  # App 快捷方式
  quick_actions: ^1.1.0

  # 振动
  vibration: ^3.1.3

  # 设备信息
  device_info_plus: ^12.3.0

  # 桌面窗口控制
  desktop_window: ^0.4.0

  # 刮刮卡
  scratcher: ^2.1.0

  # 动画效果
  lottie: ^3.3.1

  # Dialog 弹窗
  flutter_smart_dialog: ^5.1.0

  # iOS 风格图标
  cupertino_icons: ^1.0.8

  # 汉字转拼音
  lpinyin: ^2.0.2

  # 图片浏览
  photo_view: ^0.15.0

  # 图表
  fl_chart: ^0.70.2

  # 代码规范
  flutter_lints: ^5.0.0

  # GetX 状态管理
  get: ^4.7.2

# 依赖覆盖
dependency_overrides:
  decimal: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/