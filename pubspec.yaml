name: hello_flutter
description: flutter 学习项目

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # 日期、条件选择器
  flutter_pickers: ^2.1.8

  # 国际化
  intl: ^0.20.2

  # Toast 插件
  oktoast: ^3.4.0

  # 网络库
  dio: ^5.8.0+1

  # 本地存储
  sp_util: ^2.0.3

  # 常用工具类
  common_utils: ^2.1.0

  # 启动 URL
  url_launcher: ^6.3.1

  # 图片选择器
  image_picker: ^1.1.2

  # 侧滑删除
  flutter_slidable: ^4.0.0

  # WebView
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.10.13

  # 键盘处理
  keyboard_actions: ^4.2.0

  # 图片缓存
  cached_network_image: ^3.4.1

  # 字符串格式化
  sprintf: ^7.0.0

  # 扫码
  mobile_scanner: ^6.0.7

  # 设备信息
  device_info_plus: ^12.3.0

  # Dialog 弹窗
  flutter_smart_dialog: ^5.1.0

  # iOS 风格图标
  cupertino_icons: ^1.0.8

  # 汉字转拼音
  lpinyin: ^2.0.2

  # 图片浏览
  photo_view: ^0.15.0

  # 图表
  fl_chart: ^0.70.2

  # GetX 状态管理
  get: ^4.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # JSON 解析（仅开发期代码生成）
  build_runner: ^2.4.17
  json_serializable: ^6.11.1

  # 代码规范（仅开发期）
  flutter_lints: ^5.0.0

# 依赖覆盖
# dependency_overrides:

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/data/